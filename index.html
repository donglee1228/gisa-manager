<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>기사 관리</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#1a1a2e;color:#eee;min-height:100vh;padding:16px;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
h2{text-align:center;font-size:18px;color:#aaa;margin-bottom:16px}
.work-date{text-align:center;font-size:22px;font-weight:800;margin:12px 0 20px;color:#e94560}
.section-label{font-size:13px;color:#888;margin-bottom:8px}
.worker-row{display:flex;gap:10px;margin-bottom:20px}
.worker-btn{
  flex:1;padding:16px;text-align:center;font-size:18px;font-weight:700;
  background:#16213e;border:2px solid #333;border-radius:14px;cursor:pointer;
  transition:all 0.15s;
}
.worker-btn.selected{border-color:#e94560;background:#2a1a3e;color:#e94560}
.worker-btn:active{transform:scale(0.97)}
.site-section{margin-bottom:18px}
.site-name{font-size:16px;font-weight:700;margin-bottom:8px;padding-left:4px}
.count-row{display:flex;gap:8px}
.count-btn{
  flex:1;padding:14px 0;text-align:center;font-size:20px;font-weight:700;
  background:#16213e;border:2px solid #333;border-radius:12px;cursor:pointer;
  transition:all 0.15s;
}
.count-btn.selected{border-color:#4CAF50;background:#1a3e2e;color:#4CAF50}
.count-btn:active{transform:scale(0.95)}
.save-btn{
  width:100%;padding:16px;margin:20px 0;font-size:18px;font-weight:700;
  background:#e94560;border:none;border-radius:14px;color:#fff;cursor:pointer;
}
.save-btn:active{opacity:0.8}
.save-btn:disabled{background:#555;color:#888}
.save-msg{text-align:center;font-size:14px;min-height:24px;margin-bottom:12px}
.divider{border-top:1px solid #333;margin:20px 0}
.record-card{background:#16213e;border-radius:12px;padding:14px;margin:8px 0}
.record-header{font-weight:700;font-size:15px;margin-bottom:6px}
.record-detail{font-size:14px;color:#aaa}
.record-detail span{margin-right:12px}
.history-toggle{text-align:center;color:#888;font-size:14px;cursor:pointer;padding:12px;margin-top:8px}
.history-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:14px}
.history-table th,.history-table td{padding:8px 6px;text-align:center;border-bottom:1px solid #333}
.history-table th{color:#888;font-size:12px}
.print-btn{
  width:100%;padding:14px;margin:16px 0;font-size:16px;font-weight:600;
  background:#0f3460;border:1px solid #2196F3;border-radius:12px;color:#2196F3;cursor:pointer;
}
.print-btn:active{opacity:0.8}
.expired{text-align:center;padding:40px 20px}
.expired h1{color:#e94560;margin-bottom:16px}
.print-overlay{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.85);z-index:200;padding:16px;overflow-y:auto;
}
.print-overlay.show{display:block}
.print-box{
  background:#1a1a2e;border:1px solid #333;border-radius:12px;
  padding:12px;white-space:pre-wrap;font-family:monospace;font-size:11px;
  line-height:1.45;color:#eee;margin-bottom:12px;
}
.print-actions{display:flex;gap:8px;margin-bottom:12px}
.print-actions button{flex:1;padding:12px;font-size:15px;font-weight:600;border:none;border-radius:10px;cursor:pointer;color:#fff}
.copy-btn{background:#4CAF50}
.close-print-btn{background:#555}
.copy-msg{text-align:center;font-size:14px;color:#4CAF50;min-height:20px;margin-bottom:8px}

/* 수정하기 */
.edit-box{background:#16213e;border-radius:12px;padding:16px;margin:8px 0}
.edit-date{
  width:100%;padding:12px;background:#1a1a2e;border:1px solid #444;
  border-radius:8px;color:#eee;font-size:16px;color-scheme:dark;
}
.edit-existing-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;margin:4px 0;background:#1a1a2e;border-radius:8px;font-size:14px;
}
.edit-delete-btn{
  width:100%;padding:12px;margin-top:8px;font-size:15px;font-weight:600;
  background:none;border:1px solid #e94560;border-radius:12px;
  color:#e94560;cursor:pointer;
}
.edit-delete-btn:active{opacity:0.8}

/* 설정 */
.settings-btn{
  position:fixed;top:12px;right:12px;background:none;border:none;
  color:#555;font-size:22px;cursor:pointer;z-index:50;padding:8px;
}
.settings-overlay{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.9);z-index:300;padding:16px;overflow-y:auto;
}
.settings-overlay.show{display:block}
.set-section{background:#16213e;border-radius:12px;padding:16px;margin:12px 0}
.set-section h3{font-size:16px;margin-bottom:12px;color:#aaa}
.set-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #333}
.set-item:last-child{border:none}
.set-item input{
  flex:1;background:#1a1a2e;border:1px solid #444;border-radius:8px;
  padding:8px;color:#eee;font-size:15px;
}
.set-item button{
  background:#e94560;border:none;color:#fff;padding:6px 12px;
  border-radius:6px;font-size:13px;cursor:pointer;
}
.set-add{
  width:100%;padding:10px;margin-top:8px;background:none;
  border:1px dashed #555;border-radius:8px;color:#888;font-size:14px;cursor:pointer;
}
.set-close{
  width:100%;padding:14px;margin-top:16px;background:#333;border:none;
  border-radius:12px;color:#eee;font-size:16px;font-weight:600;cursor:pointer;
}
  /* 화면 전환 및 하단 바 스타일 */
  #app-wrapper {
    overflow: hidden;
    position: relative;
    width: 100%;
    min-height: 100vh;
    padding-bottom: 70px; /* 하단 바 공간 */
  }
  .screen-container {
    display: flex;
    width: 200%;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .screen {
    width: 50%;
    min-height: 100vh;
    padding: 16px;
    box-sizing: border-box;
  }
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: #16213e;
    border-top: 1px solid #333;
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 1000;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #888;
    font-size: 11px;
    cursor: pointer;
    transition: color 0.2s;
  }
  .nav-item.active {
    color: #e94560;
  }
  .nav-icon {
    font-size: 20px;
    margin-bottom: 2px;
  }

  /* 알람 화면 스타일 */
  .alarm-card {
    background: #16213e;
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
    border: 1px solid #333;
  }
  .alarm-time-input {
    width: 100%;
    background: #1a1a2e;
    border: 2px solid #e94560;
    border-radius: 12px;
    color: #fff;
    font-size: 32px;
    font-weight: 800;
    padding: 15px;
    text-align: center;
    margin: 15px 0;
    color-scheme: dark;
  }
  .alarm-status {
    font-size: 15px;
    color: #aaa;
    margin-top: 10px;
  }
  .alarm-btn {
    width: 100%;
    padding: 16px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
  }
  .alarm-btn.off { background: #555; }
  .alarm-list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #1a1a2e;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div id="app-wrapper">
  <div class="screen-container" id="screenContainer">
    <!-- 메인 화면 (기존 기사 관리) -->
    <div id="main-screen" class="screen">
      <div id="app">
        <button class="settings-btn" onclick="openSettings()">&#9881;</button>
        <h2>기사 관리</h2>
        <div class="work-date" id="workDate"></div>
        <div class="section-label">누구의 기록?</div>
        <div class="worker-row" id="workerRow"></div>
        <div id="siteSections"></div>
        <button class="save-btn" id="saveBtn" disabled onclick="saveRecord()">기록 저장</button>
        <div class="save-msg" id="saveMsg"></div>
        <div class="divider"></div>
        <div class="section-label" id="todayLabel"></div>
        <div id="todayRecords"></div>
        <div class="history-toggle" onclick="toggleHistory()">이전 기록 보기 ▼</div>
        <div id="historyArea" style="display:none"></div>
        <div id="printButtons"></div>

        <div class="divider"></div>
        <div class="history-toggle" onclick="toggleEdit()">수정하기 ▼</div>
        <div id="editArea" style="display:none">
          <div class="edit-box">
            <div class="section-label">날짜 선택</div>
            <input type="date" id="editDate" class="edit-date" onchange="loadEditDate()">
            <div class="section-label" style="margin-top:12px">기사</div>
            <div class="worker-row" id="editWorkerRow"></div>
            <div id="editSiteSections"></div>
            <div id="editExisting"></div>
            <button class="save-btn" id="editSaveBtn" disabled onclick="saveEdit()">수정 저장</button>
            <button class="edit-delete-btn" id="editDeleteBtn" style="display:none" onclick="deleteEdit()">이 날 기록 삭제</button>
            <div class="save-msg" id="editMsg"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 알람 화면 -->
    <div id="alarm-screen" class="screen">
      <h2>알람 설정 (최대 5개)</h2>
      <div id="alarmListContainer">
        <!-- 알람 슬롯 5개 생성 -->
      </div>
      
      <div class="section-label" style="margin-top:20px">작동 안내</div>
      <div class="record-card">
        <div class="record-detail">
          • 지정된 시간이 되면 <b>신나는 댄스 음악</b>이 울립니다.<br>
          • 브라우저 창이 열려 있어야 작동합니다.<br>
          • 소리가 들리지 않으면 휴대폰 무음 모드를 확인해 주세요.
        </div>
      </div>
    </div>
  </div>

  <!-- 알람 울림 모달 (음악 정지용) -->
  <div class="print-overlay" id="alarmTriggerOverlay">
    <div style="text-align:center; padding-top:100px;">
      <div style="font-size:80px; margin-bottom:20px;">⏰</div>
      <h1 style="color:#e94560; margin-bottom:10px;">알람 울림!</h1>
      <p id="alarmTimeText" style="font-size:24px; margin-bottom:30px;"></p>
      <button class="save-btn" onclick="stopAlarmMusic()" style="background:#e94560; width:80%;">알람 끄기 (음악 정지)</button>
    </div>
  </div>

  <!-- 알람 음악 요소 -->
  <audio id="alarmAudio" loop></audio>

  <!-- 하단 네비게이션 -->
  <div class="bottom-nav">
    <div class="nav-item active" id="navMain" onclick="switchScreen(0)">
      <div class="nav-icon">📋</div>
      <div>기록관리</div>
    </div>
    <div class="nav-item" id="navAlarm" onclick="switchScreen(1)">
      <div class="nav-icon">⏰</div>
      <div>알람설정</div>
    </div>
  </div>
</div>

<!-- 출력 모달 -->
<div class="print-overlay" id="printOverlay">
  <div class="print-actions">
    <button class="copy-btn" onclick="copyPrint()">복사하기</button>
    <button class="close-print-btn" onclick="closePrint()">닫기</button>
  </div>
  <div class="copy-msg" id="copyMsg"></div>
  <div class="print-box" id="printBox"></div>
</div>

<!-- 설정 모달 -->
<div class="settings-overlay" id="settingsOverlay">
  <h2 style="margin-bottom:16px">설정</h2>
  <div class="set-section">
    <h3>기사 이름</h3>
    <div id="setWorkers"></div>
    <button class="set-add" onclick="addWorker()">+ 기사 추가</button>
  </div>
  <div class="set-section">
    <h3>현장 이름</h3>
    <div id="setSites"></div>
    <button class="set-add" onclick="addSite()">+ 현장 추가</button>
  </div>
  <button class="set-close" onclick="closeSettings()">닫기</button>
</div>

<div id="expiredScreen" style="display:none">
  <div class="expired">
    <h1>만료됨</h1>
    <p>1달 이상 사용하지 않아 데이터가 삭제되었습니다.</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js";
import { getDatabase, ref, set, get, onValue, remove }
  from "https://www.gstatic.com/firebasejs/11.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyAU95ureT0C0Cn2NszQk_BERnnwdnRs7XI",
  authDomain: "gisa-manager.firebaseapp.com",
  databaseURL: "https://gisa-manager-default-rtdb.firebaseio.com",
  projectId: "gisa-manager",
  storageBucket: "gisa-manager.firebasestorage.app",
  messagingSenderId: "658512800042",
  appId: "1:658512800042:web:969e7687bcf0e5ba375653"
});
const db = getDatabase(app);

const MAX_COUNT = 5;
const EXPIRY_DAYS = 30;
const COLORS = ["#4CAF50","#2196F3","#FF9800","#9C27B0","#E91E63","#00BCD4","#FF5722","#607D8B"];
const DEFAULT_WORKERS = ["이기사"];
const DEFAULT_SITES = [{name:"소노벨",color:"#4CAF50"},{name:"쿠팡",color:"#2196F3"}];

let WORKERS = [];
let SITES = [];
let selectedWorker = null;
let selectedCounts = {};
let allRecords = {};

// ===== 설정 로드 (Firebase에서) =====
function loadConfig() {
  onValue(ref(db, "config"), snap => {
    const val = snap.val();
    if (val) {
      WORKERS = val.workers || DEFAULT_WORKERS;
      SITES = (val.sites || DEFAULT_SITES).map((s,i) =>
        typeof s === "string" ? {name:s, color:COLORS[i%COLORS.length]} : s
      );
    } else {
      WORKERS = [...DEFAULT_WORKERS];
      SITES = [...DEFAULT_SITES];
      set(ref(db, "config"), {workers: WORKERS, sites: SITES});
    }
    renderAll();
  });
}

// ===== 출근일 계산 =====
function getWorkDate() {
  const now = new Date();
  if (now.getHours() < 12) now.setDate(now.getDate() - 1);
  return now;
}
function formatDate(d) {
  const days = ["일","월","화","수","목","금","토"];
  return `${d.getMonth()+1}/${d.getDate()} (${days[d.getDay()]})`;
}
function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

// ===== 만료 체크 =====
async function checkExpiry() {
  const snap = await get(ref(db, "lastActivity"));
  if (snap.exists()) {
    const diff = Date.now() - snap.val();
    if (diff > EXPIRY_DAYS * 24*60*60*1000) {
      await remove(ref(db));
      document.getElementById("app").style.display = "none";
      document.getElementById("expiredScreen").style.display = "block";
      return false;
    }
  }
  return true;
}

// ===== 렌더링 =====
function renderAll() {
  renderWorkDate();
  renderWorkers();
  renderSites();
  renderPrintButtons();
  updateSaveBtn();
  renderTodayRecords();
}

function renderWorkDate() {
  document.getElementById("workDate").textContent = formatDate(getWorkDate()) + " 기록";
}

function renderWorkers() {
  const row = document.getElementById("workerRow");
  row.innerHTML = "";
  WORKERS.forEach((name, i) => {
    const btn = document.createElement("div");
    btn.className = "worker-btn" + (selectedWorker === i ? " selected" : "");
    btn.textContent = name;
    btn.onclick = () => { selectedWorker = i; renderWorkers(); updateSaveBtn(); };
    row.appendChild(btn);
  });
}

function renderSites() {
  const container = document.getElementById("siteSections");
  container.innerHTML = "";
  SITES.forEach((site, si) => {
    const section = document.createElement("div");
    section.className = "site-section";
    const label = document.createElement("div");
    label.className = "site-name";
    label.style.color = site.color;
    label.textContent = site.name;
    section.appendChild(label);
    const row = document.createElement("div");
    row.className = "count-row";
    for (let c = 0; c <= MAX_COUNT; c++) {
      const btn = document.createElement("div");
      btn.className = "count-btn" + (selectedCounts[si] === c ? " selected" : "");
      btn.textContent = c;
      btn.style.borderColor = selectedCounts[si] === c ? site.color : "#333";
      btn.style.background = selectedCounts[si] === c ? site.color + "22" : "#16213e";
      btn.style.color = selectedCounts[si] === c ? site.color : "#eee";
      btn.onclick = () => { selectedCounts[si] = c; renderSites(); updateSaveBtn(); };
      row.appendChild(btn);
    }
    section.appendChild(row);
    container.appendChild(section);
  });
}

function renderPrintButtons() {
  const container = document.getElementById("printButtons");
  let html = '<div style="display:flex;gap:8px;margin:16px 0">';
  WORKERS.forEach(w => {
    html += `<button class="print-btn" style="flex:1;margin:0" onclick="printWorker('${w}')">${w} 출력</button>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function updateSaveBtn() {
  const btn = document.getElementById("saveBtn");
  const hasWorker = selectedWorker !== null;
  const hasCounts = Object.keys(selectedCounts).length > 0 && Object.values(selectedCounts).some(c => c > 0);
  btn.disabled = !(hasWorker && hasCounts);
}

// ===== 저장 =====
window.saveRecord = async function() {
  if (selectedWorker === null) return;
  const wd = getWorkDate();
  const dk = dateKey(wd);
  const worker = WORKERS[selectedWorker];
  const data = {};
  SITES.forEach((site, si) => { if (selectedCounts[si] > 0) data[site.name] = selectedCounts[si]; });
  if (Object.keys(data).length === 0) return;
  await set(ref(db, `records/${dk}/${worker}`), data);
  await set(ref(db, "lastActivity"), Date.now());
  const msg = document.getElementById("saveMsg");
  const parts = Object.entries(data).map(([k,v]) => `${k} x${v}`).join(", ");
  msg.textContent = `${formatDate(wd)} ${worker}: ${parts} 저장!`;
  msg.style.color = "#4CAF50";
  setTimeout(() => { msg.textContent = ""; }, 3000);
  selectedCounts = {};
  renderSites();
  updateSaveBtn();
};

// ===== 오늘 기록 =====
function renderTodayRecords() {
  const wd = getWorkDate();
  const dk = dateKey(wd);
  const dayRec = allRecords[dk] || {};
  document.getElementById("todayLabel").textContent = formatDate(wd) + " 기록 현황";
  const container = document.getElementById("todayRecords");
  container.innerHTML = "";
  if (Object.keys(dayRec).length === 0) {
    container.innerHTML = '<div class="record-card"><div class="record-detail">아직 기록 없음</div></div>';
    return;
  }
  for (const [worker, sites] of Object.entries(dayRec)) {
    const card = document.createElement("div");
    card.className = "record-card";
    const parts = Object.entries(sites).map(([s,c]) => {
      const site = SITES.find(x => x.name === s);
      return `<span style="color:${site ? site.color : '#eee'}">${s} x${c}</span>`;
    }).join("");
    const total = Object.values(sites).reduce((a,b) => a+b, 0);
    card.innerHTML = `<div class="record-header">${worker} (${total}회)</div><div class="record-detail">${parts}</div>`;
    container.appendChild(card);
  }
}

// ===== 이전 기록 =====
window.toggleHistory = function() {
  const area = document.getElementById("historyArea");
  if (area.style.display === "none") { area.style.display = "block"; renderHistory(); }
  else { area.style.display = "none"; }
};

function renderHistory() {
  const area = document.getElementById("historyArea");
  const dates = Object.keys(allRecords).sort().reverse().slice(0, 30);
  if (dates.length === 0) { area.innerHTML = '<p style="text-align:center;color:#888;padding:16px">기록 없음</p>'; return; }
  let html = '<table class="history-table"><thead><tr><th>날짜</th>';
  WORKERS.forEach(w => html += `<th>${w}</th>`);
  html += '</tr></thead><tbody>';
  for (const dk of dates) {
    const dayRec = allRecords[dk];
    const [y,m,d] = dk.split("-");
    const dt = new Date(+y, +m-1, +d);
    const days = ["일","월","화","수","목","금","토"];
    html += `<tr><td>${+m}/${+d}(${days[dt.getDay()]})</td>`;
    WORKERS.forEach(w => {
      const wr = dayRec[w] || {};
      const parts = Object.entries(wr).map(([s,c]) => `${s}${c}`).join(" ");
      if (parts) {
        html += `<td>${parts} <span style="color:#e94560;cursor:pointer;font-size:11px" onclick="deleteRecord('${dk}','${w}')">[x]</span></td>`;
      } else { html += `<td>-</td>`; }
    });
    html += '</tr>';
  }
  html += '</tbody></table>';
  // 월간 합계
  const wd = getWorkDate();
  const curMonth = `${wd.getFullYear()}-${String(wd.getMonth()+1).padStart(2,"0")}`;
  const monthDates = dates.filter(d => d.startsWith(curMonth));
  if (monthDates.length > 0) {
    const totals = {};
    WORKERS.forEach(w => { totals[w] = {}; });
    for (const dk of monthDates) {
      for (const [w, sites] of Object.entries(allRecords[dk] || {})) {
        if (!totals[w]) totals[w] = {};
        for (const [s, c] of Object.entries(sites)) { totals[w][s] = (totals[w][s] || 0) + c; }
      }
    }
    html += `<h3 style="margin-top:20px;font-size:15px;color:#aaa">${+curMonth.split("-")[1]}월 합계</h3>`;
    html += '<table class="history-table"><thead><tr><th></th>';
    SITES.forEach(s => html += `<th style="color:${s.color}">${s.name}</th>`);
    html += '<th>합계</th></tr></thead><tbody>';
    WORKERS.forEach(w => {
      let rt = 0;
      html += `<tr><td style="font-weight:700">${w}</td>`;
      SITES.forEach(s => { const v = totals[w]?.[s.name] || 0; rt += v; html += `<td>${v}</td>`; });
      html += `<td style="font-weight:700;color:#e94560">${rt}</td></tr>`;
    });
    html += '</tbody></table>';
  }
  area.innerHTML = html;
}

// ===== 삭제 =====
window.deleteRecord = async function(dk, worker) {
  const [y,m,d] = dk.split("-");
  const days = ["일","월","화","수","목","금","토"];
  const dt = new Date(+y, +m-1, +d);
  if (confirm(`${+m}/${+d}(${days[dt.getDay()]}) ${worker} 삭제?`)) {
    await remove(ref(db, `records/${dk}/${worker}`));
  }
};

// ===== 출력 =====
window.printWorker = function(worker) {
  const dates = Object.keys(allRecords).sort();
  if (dates.length === 0) { alert("기록이 없습니다"); return; }
  const dayNames = ["일","월","화","수","목","금","토"];
  let text = `[ ${worker} ]\n\n`;
  let workerTotal = 0;
  const siteTotals = {};
  for (const dk of dates) {
    const wr = allRecords[dk]?.[worker];
    if (!wr) continue;
    const [y,m,d] = dk.split("-");
    const dt = new Date(+y, +m-1, +d);
    const parts = [];
    let dayTotal = 0;
    for (const [site, cnt] of Object.entries(wr)) {
      parts.push(`${site} ${cnt}`);
      dayTotal += cnt;
      siteTotals[site] = (siteTotals[site] || 0) + cnt;
    }
    workerTotal += dayTotal;
    text += `${+m}/${+d} ${dayNames[dt.getDay()]}  ${parts.join(" / ")}  +${dayTotal}\n`;
  }
  text += `\n----------\n`;
  for (const [site, cnt] of Object.entries(siteTotals)) text += `${site}: ${cnt}\n`;
  text += `합계: ${workerTotal}회전`;
  document.getElementById("printBox").textContent = text;
  document.getElementById("printOverlay").classList.add("show");
  document.getElementById("copyMsg").textContent = "";
};

window.copyPrint = async function() {
  const text = document.getElementById("printBox").textContent;
  try {
    await navigator.clipboard.writeText(text);
    document.getElementById("copyMsg").textContent = "복사 완료!";
  } catch(e) {
    const box = document.getElementById("printBox");
    const range = document.createRange();
    range.selectNodeContents(box);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.getElementById("copyMsg").textContent = "선택됨 - 복사해주세요";
  }
};
window.closePrint = function() { document.getElementById("printOverlay").classList.remove("show"); };

// ===== 수정하기 =====
let editWorker = null;
let editCounts = {};

window.toggleEdit = function() {
  const area = document.getElementById("editArea");
  if (area.style.display === "none") {
    area.style.display = "block";
    // 오늘 날짜 기본 세팅
    const wd = getWorkDate();
    document.getElementById("editDate").value = dateKey(wd);
    editWorker = null;
    editCounts = {};
    renderEditWorkers();
    renderEditSites();
    loadEditDate();
  } else {
    area.style.display = "none";
  }
};

function renderEditWorkers() {
  const row = document.getElementById("editWorkerRow");
  row.innerHTML = "";
  WORKERS.forEach((name, i) => {
    const btn = document.createElement("div");
    btn.className = "worker-btn" + (editWorker === i ? " selected" : "");
    btn.textContent = name;
    btn.onclick = () => {
      editWorker = i;
      renderEditWorkers();
      loadEditDate();
      updateEditBtn();
    };
    row.appendChild(btn);
  });
}

function renderEditSites() {
  const container = document.getElementById("editSiteSections");
  container.innerHTML = "";
  SITES.forEach((site, si) => {
    const section = document.createElement("div");
    section.className = "site-section";
    const label = document.createElement("div");
    label.className = "site-name";
    label.style.color = site.color;
    label.textContent = site.name;
    section.appendChild(label);
    const row = document.createElement("div");
    row.className = "count-row";
    for (let c = 0; c <= MAX_COUNT; c++) {
      const btn = document.createElement("div");
      btn.className = "count-btn" + (editCounts[si] === c ? " selected" : "");
      btn.textContent = c;
      btn.style.borderColor = editCounts[si] === c ? site.color : "#333";
      btn.style.background = editCounts[si] === c ? site.color + "22" : "#16213e";
      btn.style.color = editCounts[si] === c ? site.color : "#eee";
      btn.onclick = () => { editCounts[si] = c; renderEditSites(); updateEditBtn(); };
      row.appendChild(btn);
    }
    section.appendChild(row);
    container.appendChild(section);
  });
}

window.loadEditDate = function() {
  const dk = document.getElementById("editDate").value;
  if (!dk) return;
  const existing = document.getElementById("editExisting");
  const dayRec = allRecords[dk] || {};
  const delBtn = document.getElementById("editDeleteBtn");

  // 선택된 기사의 기존 기록 불러오기
  if (editWorker !== null) {
    const worker = WORKERS[editWorker];
    const wr = dayRec[worker] || {};
    // 기존 값으로 카운트 세팅
    editCounts = {};
    SITES.forEach((site, si) => {
      if (wr[site.name]) editCounts[si] = wr[site.name];
    });
    renderEditSites();
    delBtn.style.display = Object.keys(wr).length > 0 ? "block" : "none";
  }

  // 해당 날짜 전체 기록 표시
  let html = '<div class="section-label" style="margin-top:12px">이 날 기록</div>';
  if (Object.keys(dayRec).length === 0) {
    html += '<div class="edit-existing-item" style="color:#888">기록 없음</div>';
  } else {
    for (const [w, sites] of Object.entries(dayRec)) {
      const parts = Object.entries(sites).map(([s,c]) => `${s} x${c}`).join(", ");
      const total = Object.values(sites).reduce((a,b) => a+b, 0);
      html += `<div class="edit-existing-item"><span>${w}</span><span>${parts} (${total})</span></div>`;
    }
  }
  existing.innerHTML = html;
  updateEditBtn();
};

function updateEditBtn() {
  const btn = document.getElementById("editSaveBtn");
  const dk = document.getElementById("editDate").value;
  btn.disabled = !(editWorker !== null && dk);
}

window.saveEdit = async function() {
  if (editWorker === null) return;
  const dk = document.getElementById("editDate").value;
  if (!dk) return;
  const worker = WORKERS[editWorker];

  const data = {};
  SITES.forEach((site, si) => {
    if (editCounts[si] > 0) data[site.name] = editCounts[si];
  });

  if (Object.keys(data).length === 0) {
    // 전부 0이면 삭제
    await remove(ref(db, `records/${dk}/${worker}`));
  } else {
    await set(ref(db, `records/${dk}/${worker}`), data);
  }
  await set(ref(db, "lastActivity"), Date.now());

  const msg = document.getElementById("editMsg");
  const [y,m,d] = dk.split("-");
  const parts = Object.entries(data).map(([k,v]) => `${k} x${v}`).join(", ");
  msg.textContent = `${+m}/${+d} ${worker}: ${parts || "삭제"} 완료!`;
  msg.style.color = "#4CAF50";
  setTimeout(() => { msg.textContent = ""; }, 3000);

  loadEditDate();
};

window.deleteEdit = async function() {
  if (editWorker === null) return;
  const dk = document.getElementById("editDate").value;
  const worker = WORKERS[editWorker];
  if (confirm(`${dk} ${worker} 기록 삭제?`)) {
    await remove(ref(db, `records/${dk}/${worker}`));
    editCounts = {};
    renderEditSites();
    loadEditDate();
    const msg = document.getElementById("editMsg");
    msg.textContent = "삭제 완료!";
    msg.style.color = "#e94560";
    setTimeout(() => { msg.textContent = ""; }, 3000);
  }
};

// ===== 설정 화면 =====
window.openSettings = function() {
  renderSettingsWorkers();
  renderSettingsSites();
  document.getElementById("settingsOverlay").classList.add("show");
};
window.closeSettings = function() {
  document.getElementById("settingsOverlay").classList.remove("show");
};

function renderSettingsWorkers() {
  const container = document.getElementById("setWorkers");
  container.innerHTML = "";
  WORKERS.forEach((w, i) => {
    const div = document.createElement("div");
    div.className = "set-item";
    div.innerHTML = `<input value="${w}" onchange="renameWorker(${i}, this.value)">
      <button onclick="removeWorker(${i})">삭제</button>`;
    container.appendChild(div);
  });
}

function renderSettingsSites() {
  const container = document.getElementById("setSites");
  container.innerHTML = "";
  SITES.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "set-item";
    div.innerHTML = `<input value="${s.name}" onchange="renameSite(${i}, this.value)">
      <button onclick="removeSite(${i})">삭제</button>`;
    container.appendChild(div);
  });
}

window.renameWorker = function(i, name) {
  if (!name.trim()) return;
  WORKERS[i] = name.trim();
  set(ref(db, "config/workers"), WORKERS);
};
window.removeWorker = function(i) {
  if (WORKERS.length <= 1) { alert("최소 1명 필요"); return; }
  if (confirm(`"${WORKERS[i]}" 삭제?`)) {
    WORKERS.splice(i, 1);
    set(ref(db, "config/workers"), WORKERS);
    renderSettingsWorkers();
  }
};
window.addWorker = function() {
  const name = prompt("기사 이름:");
  if (!name || !name.trim()) return;
  WORKERS.push(name.trim());
  set(ref(db, "config/workers"), WORKERS);
  renderSettingsWorkers();
};

window.renameSite = function(i, name) {
  if (!name.trim()) return;
  SITES[i].name = name.trim();
  set(ref(db, "config/sites"), SITES);
};
window.removeSite = function(i) {
  if (SITES.length <= 1) { alert("최소 1개 필요"); return; }
  if (confirm(`"${SITES[i].name}" 삭제?`)) {
    SITES.splice(i, 1);
    set(ref(db, "config/sites"), SITES);
    renderSettingsSites();
  }
};
window.addSite = function() {
  const name = prompt("현장 이름:");
  if (!name || !name.trim()) return;
  SITES.push({name: name.trim(), color: COLORS[SITES.length % COLORS.length]});
  set(ref(db, "config/sites"), SITES);
  renderSettingsSites();
};

// ===== Firebase 리스너 =====
onValue(ref(db, "records"), snap => {
  allRecords = snap.val() || {};
  renderTodayRecords();
  if (document.getElementById("historyArea").style.display !== "none") renderHistory();
});

// ===== 화면 전환 로직 =====
window.switchScreen = function(index) {
  const container = document.getElementById("screenContainer");
  const navMain = document.getElementById("navMain");
  const navAlarm = document.getElementById("navAlarm");
  
  container.style.transform = `translateX(-${index * 50}%)`;
  
  if (index === 0) {
    navMain.classList.add("active");
    navAlarm.classList.remove("active");
  } else {
    navMain.classList.remove("active");
    navAlarm.classList.add("active");
  }
};

// ===== 알람 로직 (최대 5개 + 소리 선택) =====
let autoStopTimer = null; // 10분 자동 종료 타이머
const ALARM_SOUNDS = [
  { name: "기본 알람 (디지털)", url: "https://upload.wikimedia.org/wikipedia/commons/f/f4/Alarm_Clock_%28Directory.Audio%29.mp3" },
  { name: "클래식 벨 (기계식)", url: "https://upload.wikimedia.org/wikipedia/commons/6/69/Mechanical_Clock_Ring_%28Directory.Audio%29.mp3" },
  { name: "신나는 댄스 1 (에너지)", url: "https://upload.wikimedia.org/wikipedia/commons/f/f4/Sample_dance_1.mp3" },
  { name: "신나는 댄스 2 (일렉트로)", url: "https://upload.wikimedia.org/wikipedia/commons/4/46/Electroman_Adventures_V3_by_Waterflame.mp3" },
  { name: "감성 발라드 (피아노)", url: "https://upload.wikimedia.org/wikipedia/commons/f/f9/Touching_Moments_Two_-_Higher_%28ISRC_USUAN1100037%29.mp3" }
];

let alarms = JSON.parse(localStorage.getItem("alarms")) || [
  {time: "", on: false, sound: 0}, {time: "", on: false, sound: 0}, 
  {time: "", on: false, sound: 0}, {time: "", on: false, sound: 0}, 
  {time: "", on: false, sound: 0}
];
let alarmTimer = null;

function initAlarm() {
  renderAlarmList();
  if (alarms.some(a => a.on)) startAlarmCheck();
}

function renderAlarmList() {
  const container = document.getElementById("alarmListContainer");
  container.innerHTML = "";
  
  alarms.forEach((alarm, i) => {
    const card = document.createElement("div");
    card.className = "alarm-card";
    card.style.padding = "15px";
    card.style.marginBottom = "12px";
    card.style.textAlign = "left";
    
    let soundOptions = ALARM_SOUNDS.map((s, si) => 
      `<option value="${si}" ${alarm.sound == si ? 'selected' : ''}>${s.name}</option>`
    ).join("");

    card.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <span class="section-label">알람 ${i+1}</span>
        <input type="time" id="alarmTime${i}" class="edit-date" style="width:120px; font-size:18px;" 
               value="${alarm.time}" onchange="updateAlarmTime(${i}, this.value)">
        <button class="alarm-btn ${alarm.on ? 'off' : ''}" style="width:60px; padding:10px; margin:0; font-size:14px;"
                onclick="toggleAlarmSlot(${i})">${alarm.on ? '끄기' : '켜기'}</button>
      </div>
      <div style="display:flex; gap:8px;">
        <select onchange="updateAlarmSound(${i}, this.value)" class="edit-date" style="flex:1; padding:8px; font-size:13px;">
          ${soundOptions}
        </select>
        <button onclick="previewSound(${i})" style="padding:8px 12px; background:#0f3460; border:1px solid #2196F3; border-radius:8px; color:#2196F3; font-size:12px;">🎧 들어보기</button>
      </div>
    `;
    container.appendChild(card);
  });
}

window.updateAlarmTime = function(index, value) {
  alarms[index].time = value;
  saveAlarms();
};

window.updateAlarmSound = function(index, value) {
  alarms[index].sound = parseInt(value);
  saveAlarms();
};

window.previewSound = function(index) {
  const audio = document.getElementById("alarmAudio");
  const soundIdx = alarms[index].sound;
  const url = ALARM_SOUNDS[soundIdx].url;
  
  audio.src = url;
  audio.load();
  audio.play().catch(e => {
    console.error("Audio play failed:", e);
    alert("소리 재생 실패: 브라우저가 자동 재생을 차단했거나 파일에 문제가 있습니다. 다른 소리를 선택해 보세요.");
  });
  
  setTimeout(() => { if(!document.getElementById("alarmTriggerOverlay").classList.contains("show")) audio.pause(); }, 7000);
};

window.toggleAlarmSlot = function(index) {
  if (!alarms[index].time) {
    alert("시간을 먼저 선택해 주세요.");
    return;
  }
  alarms[index].on = !alarms[index].on;
  saveAlarms();
  renderAlarmList();
  
  if (alarms.some(a => a.on)) startAlarmCheck();
  else stopAlarmCheck();
};

function saveAlarms() {
  localStorage.setItem("alarms", JSON.stringify(alarms));
}

function startAlarmCheck() {
  if (alarmTimer) clearInterval(alarmTimer);
  alarmTimer = setInterval(() => {
    const now = new Date();
    const currentTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
    
    const triggered = alarms.find(a => a.on && a.time === currentTime);
    if (triggered) {
      triggerAlarm(triggered.time, triggered.sound);
      // 알람 울린 후 해당 슬롯만 끔
      const idx = alarms.indexOf(triggered);
      alarms[idx].on = false;
      saveAlarms();
      renderAlarmList();
    }
  }, 30000); // 30초마다 체크
}

function stopAlarmCheck() {
  if (alarmTimer) clearInterval(alarmTimer);
}

function triggerAlarm(time, soundIdx) {
  const audio = document.getElementById("alarmAudio");
  audio.src = ALARM_SOUNDS[soundIdx].url;
  audio.currentTime = 0;
  audio.play().catch(e => console.log("자동 재생 제한:", e));

  if (navigator.vibrate) {
    navigator.vibrate([500, 200, 500, 200, 500, 200, 500]);
  }

  document.getElementById("alarmTimeText").textContent = `설정 시간: ${time}`;
  document.getElementById("alarmTriggerOverlay").classList.add("show");

  // ★ 10분 후 자동 종료 기능 추가 (층간소음 방지)
  if (autoStopTimer) clearTimeout(autoStopTimer);
  autoStopTimer = setTimeout(() => {
    console.log("10분 경과: 알람을 자동으로 종료합니다.");
    stopAlarmMusic();
  }, 600000); // 10분 = 600,000ms
}

window.stopAlarmMusic = function() {
  const audio = document.getElementById("alarmAudio");
  audio.pause();
  document.getElementById("alarmTriggerOverlay").classList.remove("show");
  
  // 수동으로 껐을 경우 자동 종료 타이머 해제
  if (autoStopTimer) {
    clearTimeout(autoStopTimer);
    autoStopTimer = null;
  }
};

// ===== 초기화 =====
async function init() {
  const ok = await checkExpiry();
  if (!ok) return;
  set(ref(db, "lastActivity"), Date.now());
  loadConfig();
  initAlarm(); // 알람 초기화 추가
}
init();
</script>
